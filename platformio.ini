; ============================================================
; Alchemist Study — ESP32-C3 Super Mini firmware
;
; PLATFORM: pioarduino fork, pinned to release 55.03.39
;   = arduino-esp32 core 3.3.9 / ESP-IDF 5.5.4.
;   Required for core 3.x: tone()/noTone() and the ESP32Encoder
;   pull-resistor API behave differently on the stock espressif32
;   platform (frozen on core 2.x). This pin is unrelated to WiFi —
;   pioarduino 3.x provides tone() AND WiFi. Do not silently bump.
; ============================================================

[platformio]
default_envs = c3-prod

[common]
lib_deps_base =
    olikraus/U8g2@^2.36.18
    ; NOTE: no encoder library. madhephaestus/ESP32Encoder relies on the PCNT
    ; pulse-counter peripheral, which the ESP32-C3 does NOT have (the lib emits
    ; "#warning PCNT not supported on this SoC" and fails to link on C3). The
    ; encoder is decoded with a small GPIO-interrupt quadrature routine in
    ; src/quadrature.h (shared by main.cpp and the diagnostics) instead.

build_flags_base =
    -Isrc
    -std=gnu++17

build_unflags_base =
    -std=gnu++11

build_flags_release =
    -Os
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -DCORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_ERROR

build_flags_debug =
    -O0
    -g3
    -ggdb
    -DCORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_INFO

; ========================================
; BASE ENVIRONMENT — ESP32-C3 Super Mini
; ========================================
[env:esp32c3_base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-c3-devkitc-02
framework = arduino
monitor_speed = 115200
upload_speed = 460800
lib_deps = ${common.lib_deps_base}
; USB-CDC serial over the C3's native USB.
build_flags =
    ${common.build_flags_base}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
build_unflags = ${common.build_unflags_base}
; Real firmware builds everything EXCEPT the standalone diagnostic program.
build_src_filter = +<*> -<hwcheck.cpp>
; Build gate: authored story text must fit its screen budgets — overflow
; would ship as silently truncated cards. Fails the build with the
; offending node named. Budgets documented in the script.
extra_scripts = pre:tools/check_story_text.py

; ========================================
; PRODUCTION (default)
; ========================================
[env:c3-prod]
extends = env:esp32c3_base
build_flags =
    ${env:esp32c3_base.build_flags}
    ${common.build_flags_release}

; ========================================
; DEVELOPMENT (verbose logs, exception decoder)
; ========================================
[env:c3-dev]
extends = env:esp32c3_base
build_flags =
    ${env:esp32c3_base.build_flags}
    ${common.build_flags_debug}
    ; Bench shortcut on the Place panel: short press fakes two bottles (act 2),
    ; long press fakes three (act 3); long-press mid-brew drops them again —
    ; test the act minigames without magnets.
    -D BENCH_SIM_COMBO
monitor_filters =
    esp32_exception_decoder
    colorize
monitor_rts = 0
monitor_dtr = 0

; ========================================
; HARDWARE CHECK (standalone diagnostic program)
;   pio run -e c3-hwcheck -t upload
;   pio device monitor -b 115200
; Builds src/hwcheck.cpp instead of src/main.cpp.
; ========================================
[env:c3-hwcheck]
extends = env:esp32c3_base
build_src_filter = +<hwcheck.cpp> -<main.cpp>
build_flags =
    ${env:esp32c3_base.build_flags}
    ${common.build_flags_debug}
